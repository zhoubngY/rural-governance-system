version: '3.8'
services:
  db:
    image: postgres:17.9-alpine
    container_name: rural_gov_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rural_gov}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rural_gov_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rural_gov}
      NLP_SERVICE_URL: http://nlp-service:8001
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  nlp-service:
    build: ./nlp-service
    container_name: rural_gov_nlp
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./nlp-service/data:/app/data
      - ./nlp-service/models_store:/app/models_store

volumes:
  postgres_data:
